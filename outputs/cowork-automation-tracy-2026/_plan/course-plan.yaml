# ─────────────────────────────────────────────
# 7. PER-CHAPTER WORK ASSIGNMENTS
# ─────────────────────────────────────────────
per_chapter_assignments:

  - &ch_template
    chapter: 1
    supervisor: ChapterSupervisorAgent
    deliverables:
