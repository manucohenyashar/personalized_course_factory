  # rewards. Examples should connect to real pain points she named in the assignment document.

# Additional context for generators
knowledge_gaps:
  - Claude Cowork skills: what they are, how to create and test them, and when to use them
    instead of a one-off prompt
  - Claude plugins and MCP tools: how to connect Claude to external business systems safely
  - Browser automation with Playwright MCP: how to automate repetitive web-based tasks
  - Zapier-mediated SaaS workflows: trigger-action automation across business applications
  - Agent workflows: how to design multi-step autonomous agents with human oversight checkpoints
  - CLAUDE.MD and persistent context files: how to encode reusable behavioral preferences
  - Scheduled and recurring automations: how to set up daily/weekly workflows that run
    automatically without manual invocation
  - Prompt injection and safe automation governance: how to avoid security risks when
    automating access to email, Drive, and project systems
  - Evaluation rubrics for automation outputs: how to assess whether a generated report or
    summary is accurate, complete, and safe before distributing it

learning_goals:
  - Build a reusable Claude skill that generates weekly project status reports by pulling from
    Jira, Confluence, Slack, and meeting transcripts — reducing report prep from hours to minutes
  - Create a meeting transcript summarization workflow that produces structured summaries
    (decisions, action items, risks) accurate enough to replace the current Gemini auto-notes
  - Design a Gmail triage and Google Drive organization system using Claude automations that
    makes any past email, document, or meeting recording locatable in under 30 seconds
  - Develop confidence operating Claude Cowork at a practical, self-sufficient level — creating,
    testing, and refining her own skills without needing engineering support
  - Build a personal automation portfolio she can extend and share with her team over time

persona_notes: |
  Tracy has a music background (jazz piano, composition, music production) alongside her
  technical career — she is highly creative, detail-oriented, and comfortable with complexity.
  She authored training materials and operational specifications for offshore teams at Nuance,
  which means she understands structured documentation and is familiar with the discipline of
  writing clear, unambiguous instructions — a skill directly transferable to writing Claude
  skills and CLAUDE.MD files. She managed data annotation processes across 40 languages and
  built vendor networks, suggesting high tolerance for ambiguity and strong pattern-recognition
  skills. Course content should acknowledge her as a capable practitioner who is learning a
  new toolset, not a beginner learning how to work. Examples should draw from her actual
  systems (Jira, ServiceNow, Confluence, Gmail, Google Drive) and her actual deliverables
  (executive status reports, QBRs, meeting summaries). Avoid generic "user submits a request"
  framing — every example should feel like it came from Tracy's real Tuesday morning.
