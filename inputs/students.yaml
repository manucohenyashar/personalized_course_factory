professional_context: |
  Tracy is Senior Program Manager (AI Program Manager) at Advisor360°, a wealth-management
  SaaS company based in Weston, Massachusetts. She works in a hybrid engineering and
  customer-success environment, managing AI feature roadmaps, ServiceNow product ownership,
