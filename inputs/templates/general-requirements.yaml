# General Course Requirements
# ─────────────────────────────────────────────────────────────────────────────
# These requirements take the highest precedence in the pipeline.
# They override defaults set by the subject spec, orchestration spec, and
# master spec NUMERIC defaults. Master MUST gates (quality rules) cannot be
# overridden by any field here.
#
# All fields are OPTIONAL. Leave a field commented out to use the default.
# Uncomment and fill in only the fields you want to override.
#
# Precedence:
#   General Requirements > Student Context > Problem Spec > Subject Spec
#                        > Orchestration Spec > Master Spec defaults
# ─────────────────────────────────────────────────────────────────────────────

# ── Course length ─────────────────────────────────────────────────────────────

# Total course duration. The planner will adjust chapter count and time budgets
# to stay within this range. If both are set, max is the hard ceiling.
# total_hours_min: 3       # shortest acceptable total (default: 3 h)
# total_hours_max: 6       # longest acceptable total (default: 8 h)

# Exact number of chapters. Overrides the chapter list in inputs/subject.md.
# The planner will merge or split subject chapters to hit this count.
# chapter_count: 8

# Target duration per chapter in minutes. Overrides the 45–90 min default.
# chapter_duration_minutes: 60   # used as target; planner may vary ±15 min


# ── Content focus ─────────────────────────────────────────────────────────────

# Topics or skills the course MUST emphasize. The planner will allocate at
# least one dedicated section per topic and assign higher Bloom levels where
# the subject spec would default to lower ones.
# focus_areas:
#   - "prompt engineering for structured output"
#   - "debugging and error recovery"
#   - "hands-on automation pipelines"

# Topics to exclude entirely from chapter content. The planner will skip or
# minimize these, even if they appear in inputs/subject.md.
# exclude_topics:
#   - "history and background"
#   - "theoretical foundations"

# Difficulty target. Shifts the Bloom distribution across the course.
#   beginner     → heavier Remember/Understand early; Apply by end
#   intermediate → Apply/Analyze throughout; some Evaluate/Create
#   advanced     → Analyze/Evaluate/Create from chapter 2 onward
# difficulty_target: intermediate


# ── Artifact selection ────────────────────────────────────────────────────────

# Which artifact types to generate. The default generates all six per chapter.
# Remove any type you do not need. Valid values:
#   doc, exercises, slides, quiz, podcast, companion
# artifact_types:
#   - doc
#   - exercises
#   - slides
#   - quiz
#   - podcast
#   - companion

# ── Delivery format ───────────────────────────────────────────────────────────

# How the course will be delivered. Affects tone and artifact priorities.
#   self_paced        → heavy doc + exercises; slides are reference material
#   instructor_led    → slides are primary; doc is pre-read; exercises are in-class
#   blended           → both modes produced (default)
# delivery_format: blended


# ── Free-form instructions ────────────────────────────────────────────────────

# Any additional instructions for the planner and generators. Keep these
# specific and actionable. Examples:
#   - "Each chapter must open with a real failure case, not a success story."
#   - "Avoid any reference to vendor-specific cloud platforms."
#   - "All code examples must be in Python; no shell scripts."
# custom_instructions: |
#   Write here.
