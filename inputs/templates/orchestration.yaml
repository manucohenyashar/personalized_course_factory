# Orchestration Spec — Pipeline settings and numeric overrides
# Edit this file to tune the pipeline. All overrides are logged in _plan/CHANGELOG.md.
# Precedence: Student Context > Problem > Subject > Orchestration > Master spec defaults.

pipeline_steps:
  - planner
  - chapter_supervisor   # iterates over all chapters
  - evaluator            # course-wide validation
  - lab_generator        # capstone lab (uses reserved scenarios)
  - environment_scaffold # devcontainer + preflight scripts

# Regeneration policy: how many times to retry a failing generator before halting.
regeneration_policy:
  max_attempts: 3
  on_final_failure: halt  # options: halt | skip_and_log

# Which §16 quality gates to run. "all" means 16.1 through 16.7.
quality_gates_to_run: all

# Output root (relative to repo root). Course slug becomes a sub-directory.
output_root: outputs/

# Mode targets for all artifacts. Self-taught and cohort are produced simultaneously.
mode_targets:
  - self_taught
  - cohort

# Numeric overrides — override master spec defaults.
# To override, uncomment the relevant block. ALL overrides MUST be logged in CHANGELOG.md.
numeric_overrides:
  # Chapter doc
  # doc:
  #   word_count_min: 3000
  #   word_count_max: 6000

  # Quiz
  # quiz:
  #   items: 10          # default: 10 graded items
  #   carryforward: 2    # default: 2 carry-forward items
  #   pass: 0.80         # default: 80 % passing threshold
  #   difficulty_band: [0.40, 0.95]
  #   position_cap: 0.35
  #   forms: 2           # must be 2; Form A + Form B

  # Exercise pack
  # exercises:
  #   pack_minutes: 30   # SHOULD band [25,40]; 60 % floor is non-overridable

  # Slide deck
  # slides:
  #   count_min: 12
  #   count_max: 25

  # Podcast
  # podcast:
  #   word_count_min: 1200
  #   word_count_max: 2300
